<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serwis Elektroniki</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light">

<div class="layout">

    <div class="center-content">

        <header class="glass">
            <h1>Serwis Elektroniki</h1>
            <p>Naprawy • Diagnostyki</p>

            <div class="theme-switch">
                <span>☀️</span>
                <label class="switch">
                    <input type="checkbox" id="themeToggle">
                    <span class="slider"></span>
                </label>
                <span>🌙</span>
            </div>
        </header>

        <main>
            <section class="glass">
                <h2>O serwisie</h2>
                <p>
                    Zajmuję się naprawą elektroniki, diagnostyką usterek i wymianą podzespołów.
                </p>
            </section>

            <section class="glass">
                <h2>Usługi</h2>
                <ul>
                    <li>Naprawa laptopów i komputerów</li>
                    <li>Diagnostyka elektroniki</li>
                    <li>Wymiany ekranów i baterii</li>
                </ul>
            </section>

            <section class="glass">
                <h2>Kontakt</h2>
                <p>Email: <a href="mailto:brak@brak.com">narazie brak</a></p>
                <p>Telefon: <a href="tel:+48510371446">+48 510 371 446</a></p>
            </section>
        </main>

    </div>

    <aside class="side glass">
        <img src="img2.jpg" alt="Reklama 2">
    </aside>

</div>

<script src="script.js"></script>
</body>
</html>
